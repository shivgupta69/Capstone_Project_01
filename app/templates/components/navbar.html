{% if session.user_id %}
<header class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 backdrop-blur dark:border-slate-800 dark:bg-slate-900/90">
    <div class="flex h-16 items-center justify-between px-4 sm:px-6">
        <div class="flex items-center gap-3">
            <button id="openSidebar" class="rounded-md p-2 text-slate-500 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800 lg:hidden" aria-label="Open sidebar">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
            </button>
            <div>
                <p class="text-sm text-slate-500 dark:text-slate-400">Workspace</p>
                <h1 class="text-sm font-semibold">Study Command Center</h1>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button id="darkModeToggle" class="rounded-lg border border-slate-200 p-2 text-slate-500 hover:bg-slate-100 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800" title="Toggle dark mode" aria-label="Toggle dark mode">
                <svg id="sunIcon" class="hidden h-5 w-5 dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 3v1.5m0 15V21m8.25-9H21M3 12h1.5m13.182 6.182l1.06 1.06M5.258 5.258l1.06 1.06m11.364 0-1.06 1.06M6.318 17.682l-1.06 1.06M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <svg id="moonIcon" class="block h-5 w-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M21 12.79A9 9 0 1111.21 3c-.13.56-.21 1.14-.21 1.75a7.5 7.5 0 009.99 7.04z"/></svg>
            </button>
            <form action="/logout" method="post">
                <button type="submit" class="inline-flex items-center rounded-lg bg-red-600 px-3 py-2 text-sm font-semibold text-white hover:bg-red-700">Logout</button>
            </form>
        </div>
    </div>
</header>
{% else %}
<header class="border-b border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900">
    <div class="mx-auto flex h-16 max-w-6xl items-center justify-between px-4 sm:px-6">
        <a href="/" class="text-sm font-semibold">AI Study Planner</a>
        <div class="flex items-center gap-2">
            <button id="darkModeToggle" class="rounded-lg border border-slate-200 p-2 text-slate-500 hover:bg-slate-100 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800" title="Toggle dark mode" aria-label="Toggle dark mode">
                <svg class="hidden h-5 w-5 dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 3v1.5m0 15V21m8.25-9H21M3 12h1.5m13.182 6.182l1.06 1.06M5.258 5.258l1.06 1.06m11.364 0-1.06 1.06M6.318 17.682l-1.06 1.06M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <svg class="block h-5 w-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M21 12.79A9 9 0 1111.21 3c-.13.56-.21 1.14-.21 1.75a7.5 7.5 0 009.99 7.04z"/></svg>
            </button>
            <a href="/login" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">Login</a>
            <a href="/register" class="rounded-lg bg-primary-600 px-3 py-2 text-sm font-semibold text-white hover:bg-primary-700">Register</a>
        </div>
    </div>
</header>
{% endif %}
