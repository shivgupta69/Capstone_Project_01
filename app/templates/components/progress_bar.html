<div>
    <div class="mb-2 flex items-center justify-between">
        <span class="text-xs font-semibold text-slate-600">{{ label }}</span>
        <span class="rounded-full bg-slate-100 px-2 py-0.5 text-xs font-bold text-slate-700">{{ value }}</span>
    </div>
    <div class="group relative h-3 overflow-hidden rounded-full bg-slate-100">
        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent" style="animation: shimmer 2s infinite;"></div>
        <div class="h-full rounded-full {{ color_class }} transition-all duration-700 ease-out" style="width: {{ percent }}%"></div>
    </div>
    <style>
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</div>
