{% extends "base.html" %}

{% block title %}Login - AI Study Planner{% endblock %}

{% block body %}
<div class="min-h-[calc(100vh-280px)] flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md">
        <!-- Card with subtle entrance animation -->
        <div class="bg-white dark:bg-dark-800 rounded-2xl shadow-soft dark:shadow-dark-soft border border-gray-100 dark:border-dark-700 p-8 animate-scale-in theme-transition">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-gradient-to-br from-indigo-500 to-indigo-600 rounded-2xl shadow-glow dark:shadow-dark-glow mb-4">
                    <span class="text-2xl">📚</span>
                </div>
                <h2 class="text-2xl font-semibold text-gray-900 dark:text-gray-50 mb-1.5 tracking-tight">Welcome back</h2>
                <p class="text-sm text-gray-500 dark:text-gray-400">Sign in to continue planning your studies</p>
            </div>

            <!-- Form -->
            <form method="post" class="space-y-5">
                <div class="space-y-1.5">
                    <label for="username" class="block text-xs font-semibold text-gray-700 dark:text-gray-300 uppercase tracking-wide">Username</label>
                    <input
                        type="text"
                        name="username"
                        id="username"
                        placeholder="Enter your username"
                        required
                        autocomplete="username"
                        class="w-full px-4 py-3 border border-gray-200 dark:border-dark-600 rounded-xl text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 outline-none theme-transition bg-gray-50 dark:bg-dark-900/50 hover:bg-white dark:hover:bg-dark-900"
                    >
                </div>

                <div class="space-y-1.5">
                    <label for="password" class="block text-xs font-semibold text-gray-700 dark:text-gray-300 uppercase tracking-wide">Password</label>
                    <input
                        type="password"
                        name="password"
                        id="password"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                        class="w-full px-4 py-3 border border-gray-200 dark:border-dark-600 rounded-xl text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 outline-none theme-transition bg-gray-50 dark:bg-dark-900/50 hover:bg-white dark:hover:bg-dark-900"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full px-4 py-3 text-sm font-semibold text-white bg-gradient-to-r from-indigo-600 to-indigo-500 rounded-xl hover:from-indigo-700 hover:to-indigo-600 focus:ring-2 focus:ring-indigo-500/30 focus:ring-offset-2 dark:focus:ring-offset-dark-800 transition-all duration-200 btn-press shadow-soft hover:shadow-elevated"
                >
                    Sign in
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-100 dark:border-dark-700 theme-transition"></div>
                </div>
                <div class="relative flex justify-center text-xs">
                    <span class="px-3 bg-white dark:bg-dark-800 text-gray-400 dark:text-gray-500 theme-transition">or</span>
                </div>
            </div>

            <!-- Register Link -->
            <p class="text-center text-sm text-gray-500 dark:text-gray-400">
                New to AI Study Planner?
                <a href="/register" class="font-semibold text-indigo-600 dark:text-indigo-400 hover:text-indigo-700 dark:hover:text-indigo-300 transition-colors">Create an account</a>
            </p>
        </div>

        <!-- Trust Badge -->
        <div class="text-center mt-8">
            <p class="text-xs text-gray-400 dark:text-gray-500 flex items-center justify-center gap-2 theme-transition">
                <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                Secure login for your study data
            </p>
        </div>
    </div>
</div>
{% endblock %}
