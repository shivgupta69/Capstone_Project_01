services:
  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    env_file:
      - ../backend/.env
    ports:
      - "5000:5000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
